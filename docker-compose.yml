services:
  postgres:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
      POSTGRES_DB: bot
    networks:
      - internal
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    restart: always
    networks:
      - internal

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - public
      - internal
    volumes:
      - ./session.session:/app/session.session
    depends_on:
      - postgres
      - redis
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .venv/
        - action: rebuild
          path: ./pyproject.toml

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true

volumes:
  postgres_data:
