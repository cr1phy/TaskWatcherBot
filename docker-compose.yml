services:
  postgres:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
      POSTGRES_DB: bot
    networks:
      - internal
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    restart: always
    command: redis-server --appendonly yes
    networks:
      - internal
    volumes:
      - redis_data:/data

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - public
      - internal
    volumes:
      - ./session.session:/app/session.session
      - ./authorized_user.json:/root/.config/gspread/authorized_user.json
    depends_on:
      - postgres
      - redis
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .venv/
        - action: rebuild
          path: ./pyproject.toml

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  redis_data:
